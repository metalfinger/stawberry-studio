name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install backend
        run: |
          python -m venv venv
          ./venv/bin/pip install -U pip
          ./venv/bin/pip install -e .
          ./venv/bin/pip install pytest pytest-asyncio ruff mypy

      - name: Lint (ruff)
        run: ./venv/bin/ruff check backend/
        continue-on-error: true   # advisory during the revamp

      - name: Type-check (mypy on strict-typed modules)
        run: ./venv/bin/mypy
        continue-on-error: true   # phased rollout; warnings only for now

      - name: Pytest
        run: ./venv/bin/pytest -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm run build
